<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Criar Empresa • Mercatto Systems</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --border:#1f2937;
  --text:#f9fafb;
  --muted:#9ca3af;
  --brand:#22c55e;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:480px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

h1{
  margin:0 0 20px;
  font-size:24px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#020617;
  color:#fff;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:var(--brand);
  color:#000;
  font-weight:700;
  cursor:pointer;
}

.status{
  margin-top:15px;
  font-size:14px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Criar Empresa</h1>

<input id="email" placeholder="Email">
<input id="senha" placeholder="Senha" type="password">
<input id="nome" placeholder="Nome">
<input id="fantasia" placeholder="Nome Fantasia">
<input id="cnpj" placeholder="CNPJ">

<button onclick="criar()">Criar Empresa</button>

<div class="status" id="status"></div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://fcehmjmtxqmrjkuqlkay.supabase.co",
  "sb_publishable_iCDWHsq6EguNauQPP49JCg_jUNcz30o"
);

async function criar(){

  const status = document.getElementById("status")
  status.innerText = "Criando..."

  try{

    const { error } = await supabase.rpc("criar_empresa_completa", {
      p_email: document.getElementById("email").value,
      p_senha: document.getElementById("senha").value,
      p_nome: document.getElementById("nome").value,
      p_nome_fantasia: document.getElementById("fantasia").value,
      p_cnpj: document.getElementById("cnpj").value
    })

    if(error){
      status.innerText = "Erro: " + error.message
      return
    }

    status.innerText = "✅ Empresa criada com sucesso!"

  }catch(err){
    status.innerText = "Erro inesperado"
  }

}

</script>

</body>
</html>
