<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Admin • Empresas</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

:root{
--bg:#f8fafc;
--card:#ffffff;
--border:#e2e8f0;
--text:#0f172a;
--muted:#64748b;
--primary:#2563eb;
--success:#16a34a;
--danger:#dc2626;
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
}

/* HEADER */
.header{
padding:20px;
background:#fff;
border-bottom:1px solid var(--border);
font-weight:800;
font-size:20px;
}

/* FILTRO */
.top{
display:flex;
gap:10px;
padding:20px;
}

input{
padding:10px;
border-radius:10px;
border:1px solid var(--border);
flex:1;
}

/* GRID */
.grid{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#fff;
border:1px solid var(--border);
border-radius:16px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.card h3{
margin:0 0 10px;
}

.badge{
padding:5px 10px;
border-radius:999px;
font-size:12px;
display:inline-block;
}

.ativo{background:#dcfce7;color:#166534;}
.bloqueado{background:#fee2e2;color:#991b1b;}
.vencido{background:#fef3c7;color:#92400e;}

.row{
font-size:13px;
margin:4px 0;
color:var(--muted);
}

/* BOTÕES */
.actions{
margin-top:10px;
display:flex;
gap:8px;
}

.btn{
flex:1;
padding:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.btn-green{background:var(--success);color:#fff;}
.btn-red{background:var(--danger);color:#fff;}
.btn-blue{background:var(--primary);color:#fff;}

</style>
</head>

<body>

<div class="header">Painel de Empresas</div>

<div class="top">
<input id="busca" placeholder="Buscar empresa..." oninput="render()">
</div>

<div class="grid" id="grid"></div>

<script>

/* CONFIG */
const SUPABASE = window.supabase.createClient(
  "https://fcehmjmtxqmrjkuqlkay.supabase.co",
  "sb_publishable_iCDWHsq6EguNauQPP49JCg_jUNcz30o"
);



  
let empresas = [];

/* LOAD */
async function load(){

const { data, error } = await SUPABASE
.from('empresas')
.select('*')
.order('created_at', { ascending: false });

empresas = data || [];
render();

}

/* RENDER */
function render(){

const termo = document.getElementById('busca').value.toLowerCase();

const grid = document.getElementById('grid');

grid.innerHTML = "";

empresas
.filter(e => 
e.nome.toLowerCase().includes(termo) ||
(e.nome_fantasia || "").toLowerCase().includes(termo)
)
.forEach(e => {

const vencido = new Date(e.assinatura_expira) < new Date();

const statusClass = vencido ? 'vencido' : e.status;

grid.innerHTML += `
<div class="card">

<h3>${e.nome}</h3>

<span class="badge ${statusClass}">
${vencido ? "Vencido" : e.status}
</span>

<div class="row">Plano: ${e.plano}</div>
<div class="row">Email: ${e.email}</div>
<div class="row">Cidade: ${e.cidade}</div>
<div class="row">Expira: ${formatDate(e.assinatura_expira)}</div>
<div class="row">Valor: R$ ${e.valor_mensal}</div>

<div class="actions">
<button class="btn btn-green" onclick="ativar('${e.id}')">Ativar</button>
<button class="btn btn-red" onclick="bloquear('${e.id}')">Bloquear</button>
<button class="btn btn-blue" onclick="editar('${e.id}')">Editar</button>
</div>

</div>
`;

});

}

/* FORMAT DATA */
function formatDate(d){
if(!d) return "-";
return new Date(d).toLocaleDateString();
}

/* AÇÕES */
async function ativar(id){
await SUPABASE.from('empresas')
.update({ status: 'ativo', assinatura_ativa: true })
.eq('id', id);
load();
}

async function bloquear(id){
await SUPABASE.from('empresas')
.update({ status: 'bloqueado', assinatura_ativa: false })
.eq('id', id);
load();
}

function editar(id){
alert("editar empresa: " + id);
}

/* INIT */
load();

</script>

</body>
</html>
