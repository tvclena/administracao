<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mercatto Systems • Painel</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --border:#1e293b;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --brand:#22c55e;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */
.login{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:100%;
  max-width:400px;
  background:var(--card);
  padding:30px;
  border-radius:20px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:#fff;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:var(--brand);
  font-weight:bold;
}

/* DASHBOARD */
.app{
  display:none;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;
}

.logout{
  background:#ef4444;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <h2>🔐 Login</h2>
    <input id="email" placeholder="Email">
    <input id="senha" placeholder="Senha" type="password">
    <button onclick="entrar()">Entrar</button>
    <div id="status"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="header">
    <h2 id="empresaNome">Carregando...</h2>
    <div class="logout" onclick="logout()">Sair</div>
  </div>

  <div class="card">
    <h3>👤 Usuário</h3>
    <div id="userEmail"></div>
  </div>

  <div class="card">
    <h3>🏢 Empresa</h3>
    <div id="empresaInfo"></div>
  </div>

  <div class="card">
    <h3>📊 Acessos</h3>
    <div id="logins"></div>
  </div>

</div>

<script>

// 🔥 SUAS CREDENCIAIS
const supabase = window.supabase.createClient(
  "https://fcehmjmtxqmrjkuqlkay.supabase.co",
  "sb_publishable_iCDWHsq6EguNauQPP49JCg_jUNcz30o"
)

// =========================
// LOGIN
// =========================
async function entrar(){

  const status = document.getElementById("status")
  status.innerText = "Entrando..."

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: senha.value
  })

  if(error){
    status.innerText = error.message
    return
  }

  carregar()
}

// =========================
// CARREGAR APP
// =========================
async function carregar(){

  document.getElementById("login").style.display = "none"
  document.getElementById("app").style.display = "block"

  const { data: { user } } = await supabase.auth.getUser()

  document.getElementById("userEmail").innerText = user.email

  // busca empresa via vínculo
  const { data: vinculo } = await supabase
    .from("usuarios_empresas")
    .select("empresa_id")
    .eq("user_id", user.id)
    .single()

  if(!vinculo){
    document.getElementById("empresaNome").innerText = "Sem empresa"
    return
  }

  const { data: empresa } = await supabase
    .from("empresas")
    .select("*")
    .eq("id", vinculo.empresa_id)
    .single()

  document.getElementById("empresaNome").innerText = empresa.nome_fantasia || empresa.nome

  document.getElementById("empresaInfo").innerHTML = `
    Plano: ${empresa.plano} <br>
    Status: ${empresa.status} <br>
    Vencimento: ${empresa.assinatura_expira}
  `

  document.getElementById("logins").innerText = empresa.total_logins || 0

  // atualiza logins
  await supabase
    .from("empresas")
    .update({
      total_logins: (empresa.total_logins || 0) + 1,
      ultimo_login: new Date()
    })
    .eq("id", empresa.id)

}

// =========================
// LOGOUT
// =========================
async function logout(){
  await supabase.auth.signOut()
  location.reload()
}

// =========================
// AUTO LOGIN
// =========================
supabase.auth.getSession().then(({ data })=>{
  if(data.session){
    carregar()
  }
})

</script>

</body>
</html>
